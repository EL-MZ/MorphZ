# Book settings
title: MorphZ Documentation
author: MorphZ Contributors
copyright: ""

only_build_toc_files: true

execute:
  execute_notebooks: "off"

repository:
  url: https://github.com/ApokryphaV1/MorphZ
  path_to_book: docs
  branch: main

html:
  favicon: "_static/mz_final.png"
  logo: "_static/mz_final.png"
  use_repository_button: true

sphinx:
  extra_extensions:
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
    - sphinx.ext.viewcode
  config:
    autodoc_class_signature: mixed
    autoclass_content: both
    autodoc_member_order: bysource
    autodoc_typehints: description
    html_css_files:
      - morphz.css
